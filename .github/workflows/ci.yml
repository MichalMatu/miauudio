name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting and lint
        run: pnpm check

      - name: Verify bundled open-source notices
        run: pnpm notices:check

      - name: Type-check
        run: pnpm typecheck

      - name: Run web unit tests
        run: pnpm test:unit

      - name: Build PWA
        run: pnpm build:pwa

  android:
    name: Android checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: pnpm

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync native web assets
        run: pnpm android:sync

      - name: Test, lint, and assemble Android app
        run: >-
          ./android/gradlew -p android
          :app:testDebugUnitTest
          :app:testReleaseUnitTest
          :app:verifyReleaseManifestPolicy
          :app:lintDebug
          :app:lintRelease
          :app:assembleDebug
          --stacktrace
          --console=plain
