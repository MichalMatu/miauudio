name: Build signed Android release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-release:
    name: Signed release AAB
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment: google-play

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore upload keystore
        env:
          UPLOAD_KEYSTORE_BASE64: ${{ secrets.MIAUUDIO_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          test -n "$UPLOAD_KEYSTORE_BASE64"
          printf '%s' "$UPLOAD_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/miauudio-upload.jks"
          test -s "$RUNNER_TEMP/miauudio-upload.jks"

      - name: Verify bundled open-source notices
        run: pnpm notices:check

      - name: Run source and unit checks
        run: pnpm check && pnpm typecheck && pnpm test:unit

      - name: Build and verify signed release AAB
        env:
          MIAUUDIO_UPLOAD_KEY_ALIAS: ${{ secrets.MIAUUDIO_UPLOAD_KEY_ALIAS }}
          MIAUUDIO_UPLOAD_KEY_PASSWORD: ${{ secrets.MIAUUDIO_UPLOAD_KEY_PASSWORD }}
          MIAUUDIO_UPLOAD_STORE_FILE: ${{ runner.temp }}/miauudio-upload.jks
          MIAUUDIO_UPLOAD_STORE_PASSWORD: ${{ secrets.MIAUUDIO_UPLOAD_STORE_PASSWORD }}
        run: pnpm android:release:check

      - name: Record bundle checksum
        run: sha256sum android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: miauudio-release-aab
          path: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/reports/lint-results-release.html
          if-no-files-found: error
          retention-days: 14
